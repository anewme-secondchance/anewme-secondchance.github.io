<script>
// SEARCH FIXED
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("mainSearch");
  if (!input) return;

  input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      const q = input.value.toLowerCase();

      const routes = {
        job:'employment.html',
        resume:'resume.html',
        housing:'housing.html',
        id:'id-help.html',
        money:'money.html',
        court:'legal.html',
        ged:'education.html',
        family:'family.html',

        // ✅ FIXED
        mindset:'mindset.html',
        motivation:'mindset.html',

        goal:'goals.html',
        digital:'digital-literacy.html'
      };

      for (let key in routes) {
        if (q.includes(key)) {
          location.href = routes[key];
          return;
        }
      }

      alert("No match found");
    }
  });
});
</script>
